<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <meta http-equiv="X-UA-Compatible" content="IE=edge" />
        <title>Business Standard — 10th Anniversary Offer</title>
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link
            href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600&family=Inter:wght@400;500&display=swap"
            rel="stylesheet"
        />
        <style>
            /* Reset for email clients */
            body, table, td, a { -webkit-text-size-adjust: 100%; -ms-text-size-adjust: 100%; }
            table, td { mso-table-lspace: 0pt; mso-table-rspace: 0pt; }
            img { -ms-interpolation-mode: bicubic; border: 0; outline: none; text-decoration: none; }
            body { margin: 0 !important; padding: 0 !important; width: 100% !important; }

            /* Responsive */
            @media only screen and (max-width: 480px) {
                .email-container { width: 100% !important; }
                .price-main { font-size: 32px !important; }
                .cd-block { padding: 8px 4px !important; }
                .cd-num { font-size: 20px !important; }
            }
        </style>
    </head>
    <body style="margin:0;padding:0;background:#f4f4f4;font-family:Arial,sans-serif;">

        <!-- Outer wrapper -->
        <table role="presentation" cellpadding="0" cellspacing="0" border="0" width="100%" style="background:#f4f4f4;">
            <tr>
                <td align="center" style="padding:20px 10px;">

                    <!-- Main card -->
                    <table role="presentation" class="email-container" cellpadding="0" cellspacing="0" border="0" width="420" style="max-width:420px;width:100%;background:#ffffff;border-radius:16px;overflow:hidden;mso-border-radius:16px;">

                        <!-- HEADER -->
                        <tr>
                            <td style="background:#7a1010;padding:26px 26px 22px;background-image:repeating-linear-gradient(45deg,rgba(255,255,255,0.05) 0px,rgba(255,255,255,0.05) 1px,transparent 1px,transparent 12px);">

                                <!-- Logo row -->
                                <table role="presentation" cellpadding="0" cellspacing="0" border="0" width="100%">
                                    <tr>
                                        <td width="52" valign="middle">
                                            <table role="presentation" cellpadding="0" cellspacing="0" border="0">
                                                <tr>
                                                    <td style="background:#ffffff;border-radius:8px;border:2px solid rgba(255,255,255,0.6);width:46px;height:46px;text-align:center;vertical-align:middle;padding:0;">
                                                        <img src="https://bsmedia.business-standard.com/_media/bs/img/author/thumb/business-standard-editorial-comment-1094.png"
                                                             width="42" height="42"
                                                             style="width:42px;height:42px;object-fit:cover;border-radius:6px;display:block;"
                                                             alt="BS" />
                                                    </td>
                                                </tr>
                                            </table>
                                        </td>
                                        <td valign="middle" style="padding-left:8px;">
                                            <img src="https://d16nmctz6udcu8.cloudfront.net/1704350464/assets/17367fbd5ddd479885b90144cc73354e.png"
                                                 width="150" height="auto"
                                                 style="width:150px;display:block;"
                                                 alt="Business Standard" />
                                        </td>
                                    </tr>
                                </table>

                                <!-- Headline -->
                                <table role="presentation" cellpadding="0" cellspacing="0" border="0" width="100%">
                                    <tr>
                                        <td style="padding-top:24px;">
                                            <p style="margin:0;font-family:'Playfair Display',Georgia,serif;font-size:20px;font-weight:600;color:#ffffff;line-height:1.25;">
                                                <span style="font-size:25px;">10</span> years of Business Standard Digital Subscription
                                            </p>
                                        </td>
                                    </tr>
                                </table>

                            </td>
                        </tr>

                        <!-- GOLD DIVIDER -->
                        <tr>
                            <td style="height:3px;background:rgba(122,16,16,0.25);font-size:0;line-height:0;">&nbsp;</td>
                        </tr>

                        <!-- BODY -->
                        <tr>
                            <td style="padding:22px 26px;">

                                <!-- Countdown label -->
                                <p style="margin:0 0 10px 0;font-family:Arial,sans-serif;font-size:11px;font-weight:500;color:#888888;text-align:center;letter-spacing:0.06em;text-transform:uppercase;">
                                    Offer expires in
                                </p>

                                <!-- Countdown blocks -->
                                <table role="presentation" cellpadding="0" cellspacing="0" border="0" width="100%" style="margin-bottom:18px;">
                                    <tr>
                                        <!-- Days -->
                                        <td width="25%" style="padding-right:4px;">
                                            <table role="presentation" cellpadding="0" cellspacing="0" border="0" width="100%">
                                                <tr>
                                                    <td class="cd-block" style="background:#7a1010;border-radius:8px;padding:10px 6px;text-align:center;">
                                                        <p class="cd-num" style="margin:0;font-family:'Playfair Display',Georgia,serif;font-size:24px;font-weight:600;color:#ffffff;line-height:1;">02</p>
                                                        <p style="margin:4px 0 0 0;font-family:Arial,sans-serif;font-size:9px;color:rgba(255,255,255,0.65);letter-spacing:0.05em;text-transform:uppercase;">Days</p>
                                                    </td>
                                                </tr>
                                            </table>
                                        </td>
                                        <!-- Hours -->
                                        <td width="25%" style="padding-left:4px;padding-right:4px;">
                                            <table role="presentation" cellpadding="0" cellspacing="0" border="0" width="100%">
                                                <tr>
                                                    <td class="cd-block" style="background:#7a1010;border-radius:8px;padding:10px 6px;text-align:center;">
                                                        <p class="cd-num" style="margin:0;font-family:'Playfair Display',Georgia,serif;font-size:24px;font-weight:600;color:#ffffff;line-height:1;">00</p>
                                                        <p style="margin:4px 0 0 0;font-family:Arial,sans-serif;font-size:9px;color:rgba(255,255,255,0.65);letter-spacing:0.05em;text-transform:uppercase;">Hours</p>
                                                    </td>
                                                </tr>
                                            </table>
                                        </td>
                                        <!-- Mins -->
                                        <td width="25%" style="padding-left:4px;padding-right:4px;">
                                            <table role="presentation" cellpadding="0" cellspacing="0" border="0" width="100%">
                                                <tr>
                                                    <td class="cd-block" style="background:#7a1010;border-radius:8px;padding:10px 6px;text-align:center;">
                                                        <p class="cd-num" style="margin:0;font-family:'Playfair Display',Georgia,serif;font-size:24px;font-weight:600;color:#ffffff;line-height:1;">00</p>
                                                        <p style="margin:4px 0 0 0;font-family:Arial,sans-serif;font-size:9px;color:rgba(255,255,255,0.65);letter-spacing:0.05em;text-transform:uppercase;">Mins</p>
                                                    </td>
                                                </tr>
                                            </table>
                                        </td>
                                        <!-- Secs -->
                                        <td width="25%" style="padding-left:4px;">
                                            <table role="presentation" cellpadding="0" cellspacing="0" border="0" width="100%">
                                                <tr>
                                                    <td class="cd-block" style="background:#7a1010;border-radius:8px;padding:10px 6px;text-align:center;">
                                                        <p class="cd-num" style="margin:0;font-family:'Playfair Display',Georgia,serif;font-size:24px;font-weight:600;color:#ffffff;line-height:1;">00</p>
                                                        <p style="margin:4px 0 0 0;font-family:Arial,sans-serif;font-size:9px;color:rgba(255,255,255,0.65);letter-spacing:0.05em;text-transform:uppercase;">Secs</p>
                                                    </td>
                                                </tr>
                                            </table>
                                        </td>
                                    </tr>
                                </table>

                                <!-- Offer box -->
                                <table role="presentation" cellpadding="0" cellspacing="0" border="0" width="100%" style="margin-bottom:18px;">
                                    <tr>
                                        <td style="background:#595a5c;border-radius:12px;padding:16px 18px;">

                                            <!-- Offer label -->
                                            <table role="presentation" cellpadding="0" cellspacing="0" border="0" style="margin-bottom:10px;">
                                                <tr>
                                                    <td valign="middle" style="padding-right:5px;">
                                                        <!-- Tag icon -->
                                                        <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/f/f9/OOjs_UI_icon_tag-ltr.svg/24px-OOjs_UI_icon_tag-ltr.svg.png"
                                                             width="13" height="13"
                                                             style="display:block;width:13px;height:13px;"
                                                             alt="" />
                                                    </td>
                                                    <td valign="middle">
                                                        <p style="margin:0;font-family:Arial,sans-serif;font-size:10px;font-weight:500;color:#ffffff;letter-spacing:0.09em;text-transform:uppercase;">
                                                            10th anniversary special
                                                        </p>
                                                    </td>
                                                </tr>
                                            </table>

                                            <!-- Price row -->
                                            <table role="presentation" cellpadding="0" cellspacing="0" border="0" style="margin-bottom:10px;">
                                                <tr>
                                                    <td valign="baseline" style="padding-right:10px;">
                                                        <p style="margin:0;font-family:Arial,sans-serif;font-size:15px;color:#ffffff;text-decoration:line-through;opacity:0.55;">&#8377;2,700</p>
                                                    </td>
                                                    <td valign="baseline" style="padding-right:6px;">
                                                        <p class="price-main" style="margin:0;font-family:'Playfair Display',Georgia,serif;font-size:40px;font-weight:600;color:#ffffff;line-height:1;">&#8377;999</p>
                                                    </td>
                                                    <td valign="baseline">
                                                        <p style="margin:0;font-family:Arial,sans-serif;font-size:13px;color:#ffffff;">/ year</p>
                                                    </td>
                                                </tr>
                                            </table>

                                            <!-- Validity row -->
                                            <table role="presentation" cellpadding="0" cellspacing="0" border="0">
                                                <tr>
                                                    <td valign="middle" style="padding-right:6px;">
                                                        <!-- Calendar icon (inline SVG not reliable in email, use unicode) -->
                                                        <p style="margin:0;font-family:Arial,sans-serif;font-size:14px;color:#ffffff;">&#128197;</p>
                                                    </td>
                                                    <td valign="middle">
                                                        <p style="margin:0;font-family:Arial,sans-serif;font-size:12px;color:#ffffff;">Offer valid till 24th June 2026</p>
                                                    </td>
                                                </tr>
                                            </table>

                                        </td>
                                    </tr>
                                </table>

                                <!-- CTA Button -->
                                <table role="presentation" cellpadding="0" cellspacing="0" border="0" width="100%">
                                    <tr>
                                        <td align="center">
                                            <a href="https://www.business-standard.com/special-subscription-offer"
                                               target="_blank"
                                               style="display:block;width:100%;padding:15px;background:#7a1010;color:#ffffff;font-family:Arial,sans-serif;font-size:15px;font-weight:500;text-align:center;text-decoration:none;border-radius:10px;letter-spacing:0.02em;mso-border-radius:10px;box-sizing:border-box;">
                                                Subscribe now
                                            </a>
                                        </td>
                                    </tr>
                                </table>

                            </td>
                        </tr>

                    </table>
                    <!-- /Main card -->

                </td>
            </tr>
        </table>

    </body>
</html>
