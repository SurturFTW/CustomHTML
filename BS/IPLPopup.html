<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>Stories Carousel</title>

    <script>
      const appConfig = {
        autoAdvance: true,
        imageViewDuration: 10000,
        cardWidth: "260px",
        cardHeight: "260px",
      };

      let stories = [
        {
          src: "https://bsmedia.business-standard.com/_media/bs/img/article/2024-03/22/full/1711089108-3549.jpg",
          link: "https://www.business-standard.com/sports/business/rcb-rr-ipl-shift-asset-class-billion-dollar-deals-126032500693_1.html",
          caption:
            "RCB, RR deals signal IPL's shift from a cricket league to an asset class",
          buttonText: "Read More",
        },
        {
          src: "https://bsmedia.business-standard.com/_media/bs/img/article/2026-03/24/full/1774341020-9667.jpg",
          link: "https://www.business-standard.com/sports/business/ipl-2026-team-valuation-rcb-rajasthan-royals-billion-dollar-sale-126032500664_1.html",
          caption:
            "Why IPL teams are worth billions: Decoding RCB and RR's valuation playbook",
          buttonText: "Know More",
        },
        {
          src: "https://bsmedia.business-standard.com/_media/bs/img/article/2025-05/13/full/1747127987-4558.jpg",
          link: "https://www.business-standard.com/sports/business/ipl-vs-nfl-nba-and-epl-how-india-s-t20-powerhouse-stacks-up-globally-126032500699_1.html",
          caption:
            "IPL vs NFL, NBA and EPL: How India's T20 powerhouse stacks up globally",
          buttonText: "Learn More",
        },
        {
          src: "https://bsmedia.business-standard.com/_media/bs/img/article/2025-06/04/full/1749013043-1085.jpg",
          link: "https://www.business-standard.com/sports/business/rcb-rr-billion-dollar-deals-ipl-valuations-returns-analysis-126032500659_1.html",
          caption:
            "Billion-dollar IPL deals: Do team valuations add up or signal influence?",
          buttonText: "Read More",
        },
      ];

      const displayStories = stories;
    </script>

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        background: transparent !important;
        display: flex;
        justify-content: flex-end;
        align-items: flex-end;
        height: 100vh;
      }

      /* main widget */
      .stories-wrapper {
        position: fixed;
        bottom: 20px;
        right: 20px;
        z-index: 1000;
      }

      .stories-card {
        width: 260px;
        height: 260px;
        border-radius: 20px;
        overflow: hidden;
        position: relative;
        box-shadow: 0 8px 20px rgba(0, 0, 0, 0.2);
      }

      .story-item {
        position: absolute;
        width: 100%;
        height: 100%;
        opacity: 0;
        transition: 0.4s;
      }
      .story-item.active {
        opacity: 1;
      }

      .story-item img {
        width: 100%;
        height: 100%;
        object-fit: cover;
      }

      /* gradient overlay */
      .story-overlay {
        position: absolute;
        bottom: 0;
        left: 0;
        right: 0;
        padding: 14px;
        display: flex;
        flex-direction: column;
        gap: 10px;
        align-items: center;
        text-align: center;

        background: linear-gradient(
          to top,
          rgba(0, 0, 0, 0.98) 0%,
          /* almost solid black */ rgba(0, 0, 0, 0.9) 20%,
          rgba(0, 0, 0, 0.65) 45%,
          rgba(0, 0, 0, 0.3) 70%,
          rgba(0, 0, 0, 0) 100%
        );

        max-height: 60%;
        overflow-y: auto;
      }

      .story-overlay::-webkit-scrollbar {
        display: none;
      }

      .story-caption {
        color: #fff;
        font-size: 13px;
        font-weight: 600;
        line-height: 1.5;
        text-shadow: 0 1px 3px rgba(0, 0, 0, 0.6);
      }

      .action-button {
        background: #c4122f;
        color: #fff;
        padding: 8px 14px;
        border-radius: 18px;
        text-decoration: none;
        font-size: 12px;
      }

      /* header */
      .stories-header {
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        padding: 8px;
        display: flex;
        justify-content: space-between;
        z-index: 20;
        background: linear-gradient(rgba(0, 0, 0, 0.6), transparent);
      }

      .story-indicators {
        display: flex;
        gap: 3px;
        flex: 1;
      }

      .story-indicator {
        height: 3px;
        background: rgba(255, 255, 255, 0.3);
        flex: 1;
        overflow: hidden;
      }

      .story-indicator-progress {
        height: 100%;
        width: 0%;
        background: #fff;
        transition: width linear;
      }

      .icon-button {
        background: rgba(0, 0, 0, 0.4);
        color: #fff;
        border: none;
        width: 26px;
        height: 26px;
        border-radius: 50%;
        cursor: pointer;
      }

      /* 🔴 MINIMIZER BUBBLE */
      #story-bubble {
        position: fixed;
        bottom: 20px;
        right: 20px;
        width: 60px;
        height: 60px;
        border-radius: 50%;
        overflow: hidden;
        box-shadow: 0 6px 18px rgba(0, 0, 0, 0.3);
        z-index: 1000;
        cursor: pointer;
        display: none;
        border: 2px solid #c4122f;
      }

      #story-bubble img {
        width: 100%;
        height: 100%;
        object-fit: cover;
      }
    </style>
  </head>

  <body>
    <div class="stories-wrapper">
      <div class="stories-card" id="card">
        <div class="stories-header">
          <div class="story-indicators" id="indicators"></div>
          <button id="close" class="icon-button">✕</button>
        </div>

        <div id="container"></div>
      </div>
    </div>

    <!-- bubble -->
    <div id="story-bubble">
      <img id="bubble-img" />
    </div>

    <script>
      const container = document.getElementById("container");
      const indicators = document.getElementById("indicators");
      const card = document.getElementById("card");

      const bubble = document.getElementById("story-bubble");
      const bubbleImg = document.getElementById("bubble-img");
      const wrapper = document.querySelector(".stories-wrapper");

      let index = 0,
        timer;

      /* create */
      displayStories.forEach((s, i) => {
        let item = document.createElement("div");
        item.className = "story-item" + (i === 0 ? " active" : "");

        let img = document.createElement("img");
        img.src = s.src;

        let overlay = document.createElement("div");
        overlay.className = "story-overlay";

        let cap = document.createElement("div");
        cap.className = "story-caption";
        cap.innerText = s.caption;

        let btn = document.createElement("a");
        btn.className = "action-button";
        btn.href = s.link;
        btn.target = "_blank";
        btn.innerText = s.buttonText;

        overlay.append(cap, btn);
        item.append(img, overlay);
        container.append(item);

        let ind = document.createElement("div");
        ind.className = "story-indicator";

        let prog = document.createElement("div");
        prog.className = "story-indicator-progress";

        ind.append(prog);
        indicators.append(ind);
      });

      function update() {
        clearTimeout(timer);

        let items = document.querySelectorAll(".story-item");
        let bars = document.querySelectorAll(".story-indicator-progress");

        items.forEach((el, i) => {
          el.classList.toggle("active", i === index);
          bars[i].style.transition = "none";
          bars[i].style.width = "0%";
        });

        setTimeout(() => {
          bars[index].style.transition = "width 10s linear";
          bars[index].style.width = "100%";
        }, 50);

        timer = setTimeout(next, 10000);
      }

      function next() {
        index = (index + 1) % displayStories.length;
        update();
      }

      /* tap next */
      card.addEventListener("click", next);

      /* close → minimize */
      document.getElementById("close").onclick = () => {
        wrapper.style.display = "none";
        bubble.style.display = "block";
        bubbleImg.src = "https://etimg.etb2bimg.com/photo/74594723.cms";
      };

      /* bubble click → restore */
      bubble.addEventListener("click", () => {
        wrapper.style.display = "flex";
        bubble.style.display = "none";
      });

      /* init */
      update();
    </script>
  </body>
</html>
